# Render Blueprint for The Scribe.
#
# Branch: main. Render services were originally created against
# feat/sermon-ingestion-testimony-dna; that branch was merged into main and
# deleted (see PR #2), so any Render service still configured for it stops
# receiving new commits silently -- deploys "succeed" against a stale branch
# tip with no warning. If you see a database column the code expects but the
# DB doesn't have (or vice versa), check Render's dashboard -> service ->
# Settings -> Branch first.
#
# Before the first deploy succeeds you must fill in the env vars marked
# `sync: false` in the Render dashboard (they are secrets / environment-specific
# and are intentionally NOT committed). SECRET_KEY is generated by Render.
#
# Prerequisite: this branch must be pushed to GitHub — Render only sees the
# remote.

services:
  # ── Backend API (FastAPI, Docker) ──────────────────────────────────────
  - type: web
    name: the-scribe-api
    runtime: docker
    branch: main
    # Build the image from backend/Dockerfile with the build context set to
    # backend/, so the app module resolves as `app.main` (see the Dockerfile
    # comment). This mirrors how the app runs locally.
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    region: oregon
    healthCheckPath: /api/health
    # Run migrations + seed ONCE before the new version goes live. Keeping this
    # out of the start command is what prevents the crash-loop the Railway
    # deploy hit (the web process must just run uvicorn and stay alive).
    preDeployCommand: "alembic upgrade head && python scripts/seed_scriptures.py"
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LLM_PROVIDER
        value: groq                      # or "anthropic" if you set its key
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-20250514
      # ── Secrets / environment-specific: set these in the dashboard ────────
      - key: DATABASE_URL
        sync: false                      # Supabase SESSION POOLER URL (IPv4).
                                         # postgresql://postgres.<ref>:<pwd>@aws-1-<region>.pooler.supabase.com:5432/postgres
                                         # URL-encode special chars in the password (@ -> %40, $ -> %24)
      - key: GROQ_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false                      # only needed if LLM_PROVIDER=anthropic
      - key: CORS_ORIGINS
        sync: false                      # JSON array incl. the web URL, e.g.
                                         # ["https://the-scribe-web.onrender.com"]
      - key: SECRET_KEY
        generateValue: true              # Render generates a secure random value
    # NOTE: Render injects PORT automatically; the Dockerfile binds ${PORT}.
    # Do NOT set PORT here.

  # ── Frontend (Vite static site) ────────────────────────────────────────
  - type: web
    name: the-scribe-web
    runtime: static
    branch: main
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    # SPA fallback so client-side routes (e.g. /sermons) don't 404 on refresh.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false                      # the API service URL + /api, e.g.
                                         # https://the-scribe-api.onrender.com/api
                                         # (build-time; redeploy the web service after the API URL is known)
